services:
  - type: web
    name: govt-school-exam-backend
    runtime: python
    plan: free
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: "pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/
    envVars:
      - key: MONGO_URL
        sync: false  # set in Render dashboard
      - key: DB_NAME
        value: govt_school_exam
      - key: GEMINI_API_KEY
        sync: false  # set in Render dashboard
